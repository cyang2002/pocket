spring:
  application:
    name: card-api
  jackson:
    deserialization:
      fail-on-unknown-properties: false
    serialization:
      write-enums-using-to-string: false
  datasource:
    url: jdbc:sqlite:${DB_PATH:./data/cardoptimizer.db}
    driver-class-name: org.sqlite.JDBC
    hikari:
      connection-init-sql: "PRAGMA journal_mode=WAL; PRAGMA synchronous=NORMAL;"
  flyway:
    enabled: true
    baseline-on-migrate: true
  sql:
    init:
      mode: never

cardapi:
  github:
    base-url: https://raw.githubusercontent.com
  cache:
    refresh-ms: 3600000        # proactive eviction every 60 minutes
    initial-delay-ms: 3600000  # first scheduled eviction after 60 min (not at startup)
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173
  staleness:
    threshold-days: 30

server:
  port: 8080

logging:
  level:
    com.cardoptimizer.api: INFO